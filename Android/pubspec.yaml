name: expense_diary
description: A premium finance management application for Android.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  lucide_icons: ^0.257.0
  image_picker: ^1.1.2
  fl_chart: ^0.68.0
  uuid: ^4.3.3
  path_provider: ^2.1.2
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_logo.png
    - assets/images/onboarding_home.png
    - assets/images/onboarding_insights.png
    - assets/images/onboarding_add.png
